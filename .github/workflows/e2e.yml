name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  playwright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências do backend
        run: pip install -r backend/requirements.txt

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Subir stack local do Supabase (aplica as migrations automaticamente)
        run: supabase start

      - name: Gerar backend/.env a partir das chaves locais do Supabase
        run: |
          eval "$(supabase status -o env)"
          cat > backend/.env <<EOF
          SUPABASE_URL=${API_URL}
          SUPABASE_ANON_KEY=${ANON_KEY}
          SUPABASE_SERVICE_ROLE_KEY=${SERVICE_ROLE_KEY}
          DATABASE_URL=postgresql+asyncpg://postgres:postgres@127.0.0.1:54322/postgres
          JWT_SECRET=${JWT_SECRET}
          CORS_ORIGINS=http://localhost:4173
          ENABLE_OCR_WORKER=false
          DEMO_PASSWORD=ci-demo-password-not-real
          EOF
          # Reexporta pra usar no passo de build do frontend também.
          echo "SUPABASE_API_URL=${API_URL}" >> "$GITHUB_ENV"
          echo "SUPABASE_ANON_KEY=${ANON_KEY}" >> "$GITHUB_ENV"

      - name: Semear dados de demo (empresas, pastas, documentos fictícios)
        working-directory: backend
        run: python -m app.seed.demo_data

      - name: Subir o backend em segundo plano
        working-directory: backend
        run: |
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 > backend.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && break
            sleep 1
          done
          curl -sf http://localhost:8000/health || (cat backend.log && exit 1)

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências do frontend
        working-directory: frontend
        run: npm ci

      - name: Instalar browsers do Playwright
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build do frontend apontando pro backend local
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:8000
          VITE_SUPABASE_URL: ${{ env.SUPABASE_API_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ env.SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Rodar testes E2E (Playwright)
        working-directory: frontend
        env:
          CI: "true"
        run: npx playwright test

      - name: Publicar relatório do Playwright (em caso de falha)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
