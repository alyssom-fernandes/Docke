name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências do backend
        run: pip install -r backend/requirements.txt

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Subir stack local do Supabase (aplica as migrations automaticamente)
        run: supabase start

      - name: Gerar backend/.env a partir das chaves locais do Supabase
        run: |
          eval "$(supabase status -o env)"
          cat > backend/.env <<EOF
          SUPABASE_URL=${API_URL}
          SUPABASE_ANON_KEY=${ANON_KEY}
          SUPABASE_SERVICE_ROLE_KEY=${SERVICE_ROLE_KEY}
          DATABASE_URL=postgresql+asyncpg://postgres:postgres@127.0.0.1:54322/postgres
          JWT_SECRET=${JWT_SECRET}
          CORS_ORIGINS=http://localhost:5173
          ENABLE_OCR_WORKER=false
          DEMO_PASSWORD=ci-demo-password-not-real
          EOF

      - name: Rodar testes de integração (pytest)
        working-directory: backend
        run: pytest tests -v

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências do frontend
        working-directory: frontend
        run: npm ci

      - name: Checagem de tipos (tsc)
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build de produção (vite)
        working-directory: frontend
        run: npm run build
